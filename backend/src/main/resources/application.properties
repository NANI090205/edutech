# Database Configuration (Railway MySQL or local fallback)
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/student_course_mgmt?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DATABASE_USERNAME:root}
spring.datasource.password=${DATABASE_PASSWORD:Pranathi@123}
